<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #eef2ff; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; color: #1e1b4b; }
        .indigo-prime { background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); }
        .sidebar { width: 360px; background: #312e81; border-right: 1px solid #4338ca; display: flex; flex-direction: column; color: white; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #f5f7ff; position: relative; }
        .chat-container { flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth; }
        video { width: 100%; border-radius: 12px; background: #1e1b4b; transform: scaleX(-1); object-fit: cover; aspect-ratio: 16/9; border: 2px solid #4f46e5; }
        .peer-item { cursor: pointer; transition: 0.2s; border-bottom: 1px solid #3730a3; }
        .peer-item:hover { background-color: #4338ca; }
        .active-chat { background-color: #4f46e5 !important; box-shadow: inset 4px 0 0 #818cf8; }
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.1); }
        .op-badge { background: #fbbf24; color: #451a03; font-size: 9px; font-weight: 900; padding: 2px 5px; border-radius: 5px; margin-left: 6px; text-transform: uppercase; }
        .hidden { display: none !important; }
        #v-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 12px; background: #1e1b4b; padding: 15px; border-bottom: 2px solid #4338ca; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #818cf8; border-radius: 10px; }
    </style>
</head>
<body>

<div id="auth-gate" class="fixed inset-0 z-[100] bg-indigo-50 flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-indigo-100">
        <div class="text-center mb-8">
            <div class="w-20 h-20 indigo-prime rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-2xl">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-indigo-900 tracking-tight">Indigo Mesh</h1>
            <p class="text-indigo-500 text-sm mt-2 font-medium">Secure Peer-to-Peer Protocol</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="un" placeholder="Display Name" class="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-indigo-900 font-medium">
            <input type="password" id="pw" placeholder="Cluster Password" class="w-full p-4 bg-indigo-50 border border-indigo-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-indigo-900 font-medium">
            <button onclick="core.boot()" class="w-full indigo-prime text-white py-4 rounded-2xl font-black hover:scale-[1.02] transition shadow-xl uppercase tracking-widest">Initialize Node</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden flex w-full h-full">
    <aside class="sidebar">
        <div class="p-6 border-b border-indigo-800 bg-[#282566]">
            <div class="flex justify-between items-center mb-6">
                <span class="font-black text-2xl text-white tracking-tighter">INDIGO</span>
                <button onclick="core.plusMenu()" class="p-2 bg-indigo-500 text-white rounded-xl hover:bg-indigo-400 shadow-lg transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            <button onclick="core.joinCall()" class="w-full bg-indigo-900/50 border border-indigo-400/30 text-indigo-200 py-3 rounded-xl text-xs font-black hover:bg-indigo-800 transition uppercase tracking-widest">Connect Stream</button>
        </div>
        
        <div id="peer-list" class="flex-1 overflow-y-auto"></div>

        <div class="p-6 bg-[#1e1b4b] border-t border-indigo-900">
            <div class="flex items-center justify-between mb-3">
                <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Local Node ID</span>
                <div class="flex items-center gap-1"><div class="w-2 h-2 bg-indigo-400 rounded-full animate-pulse"></div><span class="text-[10px] text-indigo-400 font-bold uppercase">Ready</span></div>
            </div>
            <div id="node-id" class="text-[10px] text-white break-all cursor-pointer font-mono bg-indigo-900/50 p-3 border border-indigo-700 rounded-xl mb-4" onclick="core.copyID()">...</div>
            <button onclick="core.deleteAll()" class="w-full py-2 text-[10px] font-black text-indigo-300 hover:text-red-400 uppercase tracking-widest transition border border-indigo-700/50 rounded-lg">Purge Mesh</button>
        </div>
    </aside>

    <main class="chat-area">
        <header id="chat-header" class="bg-white border-b border-indigo-100 px-8 py-4 flex justify-between items-center shadow-sm z-10">
            <div class="flex items-center gap-4">
                <div id="header-avatar" class="w-12 h-12 rounded-2xl indigo-prime hidden flex items-center justify-center text-white font-black text-xl shadow-lg">?</div>
                <div class="flex flex-col">
                    <div class="flex items-center"><span id="chat-title" class="font-black text-lg text-indigo-900">Select Node</span><span id="header-op" class="hidden op-badge">OP</span></div>
                    <span id="chat-status" class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Standby</span>
                </div>
            </div>
            <div id="header-tools" class="hidden flex items-center gap-4">
                <button id="v-btn" onclick="core.media(1)" class="p-2 text-indigo-400 hover:text-indigo-600 transition" title="Video"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                <button id="a-btn" onclick="core.media(0)" class="p-2 text-indigo-400 hover:text-indigo-600 transition" title="Audio"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
            </div>
        </header>

        <div id="v-grid" class="hidden">
            <video id="loc-v" autoplay muted playsinline></video>
        </div>

        <div id="feed" class="chat-container"></div>

        <div class="p-6 bg-white border-t border-indigo-50">
            <div id="typing" class="text-[10px] text-indigo-600 h-5 mb-2 font-black italic px-4 uppercase tracking-widest"></div>
            <div class="flex gap-4 items-center bg-indigo-50 p-2 rounded-2xl border border-indigo-100">
                <input type="text" id="mi" placeholder="Send command or message..." class="flex-1 bg-transparent p-3 px-4 outline-none text-indigo-900 placeholder:text-indigo-300 font-medium" oninput="core.ty()" onkeypress="if(event.key==='Enter') core.send()">
                <button onclick="core.send()" class="indigo-prime text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-lg hover:scale-105 transition"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg></button>
            </div>
        </div>
    </main>
</div>

<script>
    const db = new Dexie("SecureMeshDB");
    db.version(4).stores({ logs: '++id, pid, n, b, y, t', chats: 'pid, n, last, op' });

    const core = {
        p: null, peers: {}, currentPid: null, pass: '', me: { n: '', id: '', str: null },
        
        async boot() {
            this.me.n = document.getElementById('un').value || "Node_" + Math.floor(Math.random()*999);
            this.pass = document.getElementById('pw').value;
            if(!this.pass) return alert("Error: Cluster Password Required.");
            
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            this.p = new Peer();
            this.p.on('open', id => { 
                this.me.id = id; 
                document.getElementById('node-id').innerText = id;
                this.refreshPeers();
            });
            this.p.on('connection', c => this.initConn(c));
            this.p.on('call', call => {
                call.answer(this.me.str);
                call.on('stream', s => this.addV(call.peer, s));
            });
        },

        initConn(c) {
            c.on('open', async () => {
                this.peers[c.peer] = c;
                await db.chats.put({ pid: c.peer, n: 'Remote_Node', last: Date.now(), op: false });
                this.refreshPeers();
                this.selectChat(c.peer);
            });
            c.on('data', d => {
                if(d.pass && d.pass !== this.pass) return; 
                this.handle(d, c.peer);
            });
            c.on('close', () => { delete this.peers[c.peer]; this.refreshPeers(); });
        },

        plusMenu() {
            const act = prompt("Type 'HOST' to show your ID or 'JOIN' to link a peer:");
            if(!act) return;
            if(act.toUpperCase() === 'HOST') this.copyID();
            else if(act.toUpperCase() === 'JOIN') this.join();
        },

        async refreshPeers() {
            const list = document.getElementById('peer-list');
            const chats = await db.chats.orderBy('last').reverse().toArray();
            list.innerHTML = chats.map(c => `
                <div class="peer-item p-5 flex items-center justify-between ${this.currentPid === c.pid ? 'active-chat' : ''}" onclick="core.selectChat('${c.pid}')">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-indigo-900/50 border border-indigo-400/30 flex items-center justify-center text-white font-black">${c.n[0]}</div>
                        <div class="flex flex-col">
                            <div class="flex items-center"><span class="font-black text-sm text-white">${c.n}</span>${c.op ? '<span class="op-badge">OP</span>' : ''}</div>
                            <span class="text-[9px] ${this.peers[c.pid] ? 'text-indigo-300' : 'text-indigo-400/40'} font-black uppercase tracking-widest">${this.peers[c.pid] ? 'Linked' : 'Standby'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        },

        async selectChat(pid) {
            this.currentPid = pid;
            const chat = await db.chats.get(pid);
            document.getElementById('chat-title').innerText = chat.n;
            document.getElementById('header-op').className = chat.op ? 'op-badge' : 'hidden';
            document.getElementById('chat-status').innerText = "INDIGO_ID: " + pid;
            document.getElementById('header-avatar').innerText = chat.n[0];
            document.getElementById('header-avatar').classList.remove('hidden');
            document.getElementById('header-tools').classList.remove('hidden');
            this.refreshPeers();
            this.loadMessages();
        },

        async loadMessages() {
            const f = document.getElementById('feed');
            f.innerHTML = '';
            const msgs = await db.logs.where('pid').equals(this.currentPid).toArray();
            msgs.forEach(m => this.draw(m, false));
            f.scrollTop = f.scrollHeight;
        },

        handle(d, pid) {
            if(d.y === 'ty') {
                if(this.currentPid === pid) {
                    const t = document.getElementById('typing'); t.innerText = ">> PEER_SYNCING...";
                    clearTimeout(this.to); this.to = setTimeout(() => t.innerText = '', 1500);
                }
            } else if(d.y === 'cmd') {
                if(d.c === 'op') { db.chats.update(pid, { op: true }); this.refreshPeers(); }
                if(d.c === 'deop') { db.chats.update(pid, { op: false }); this.refreshPeers(); }
            } else if(d.y === 'name') {
                db.chats.update(pid, { n: d.b }); this.refreshPeers();
            } else {
                this.draw(d, true, pid);
            }
        },

        async media(isV) {
            try {
                if(!this.me.str) {
                    this.me.str = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('loc-v').srcObject = this.me.str;
                    document.getElementById('v-grid').classList.remove('hidden');
                }
                const t = isV ? this.me.str.getVideoTracks()[0] : this.me.str.getAudioTracks()[0];
                t.enabled = !t.enabled;
                this.copyID();
                alert("HOSTING: ID Copied. Peers must use 'Connect Stream'.");
                if(this.currentPid && this.peers[this.currentPid]) this.p.call(this.currentPid, this.me.str);
            } catch(e) { alert("Hardware Denied."); }
        },

        addV(id, s) {
            if(document.getElementById('v-'+id)) return;
            const v = document.createElement('video'); v.id = 'v-'+id; v.srcObject = s; v.autoplay = true;
            document.getElementById('v-grid').appendChild(v);
            document.getElementById('v-grid').classList.remove('hidden');
        },

        send() {
            const i = document.getElementById('mi');
            const val = i.value.trim();
            if(!val) return;

            if(val.startsWith('/')) {
                const args = val.split(' ');
                const cmd = args[0].toLowerCase();
                if(cmd === '/help') return this.help();
                if(cmd === '/name') {
                    this.me.n = args.slice(1).join('_');
                    Object.values(this.peers).forEach(p => p.send({y:'name', b: this.me.n, pass: this.pass}));
                    i.value = ''; return;
                }
                if(cmd === '/op') {
                    if(!this.currentPid) return;
                    this.peers[this.currentPid].send({y:'cmd', c:'op', pass: this.pass});
                    i.value = ''; return;
                }
                if(cmd === '/clear') {
                    db.logs.where('pid').equals(this.currentPid).delete().then(() => this.loadMessages());
                    i.value = ''; return;
                }
            }

            if(!this.currentPid) return alert("Select Node.");
            
            const m = { pid: this.currentPid, y:'msg', n:this.me.n, b:val, pass: this.pass, t:new Date().toLocaleTimeString() };
            if(this.peers[this.currentPid]) this.peers[this.currentPid].send(m);
            this.draw(m, true);
            db.chats.update(this.currentPid, { last: Date.now() });
            i.value = '';
        },

        ty() { if(this.currentPid && this.peers[this.currentPid]) this.peers[this.currentPid].send({y:'ty', pass: this.pass}); },
        
        join() {
            const id = prompt("Enter Target ID:");
            if(id && id !== this.me.id) this.initConn(this.p.connect(id));
        },

        joinCall() {
            const id = prompt("Stream Source ID:");
            if(id && this.me.str) this.p.call(id, this.me.str);
            else if(id) alert("Enable camera icon first.");
        },

        draw(d, s, pid) {
            const targetPid = pid || d.pid;
            if(s) db.logs.add({ ...d, pid: targetPid });
            if(this.currentPid !== targetPid) { this.refreshPeers(); return; }
            const f = document.getElementById('feed');
            const w = document.createElement('div');
            w.className = d.n === this.me.n ? "flex justify-end mb-6" : "flex justify-start mb-6";
            const m = document.createElement('div');
            m.className = `msg-bubble ${d.n === this.me.n ? 'indigo-prime text-white rounded-tr-none' : 'bg-white text-indigo-900 rounded-tl-none border border-indigo-100'}`;
            m.innerHTML = `<div class="text-[9px] ${d.n === this.me.n ? 'text-indigo-200' : 'text-indigo-400'} font-black mb-2 uppercase tracking-widest">${d.n} • ${d.t}</div><div class="font-medium">${d.b}</div>`;
            w.appendChild(m); f.appendChild(w); f.scrollTop = f.scrollHeight;
        },

        async deleteAll() {
            if(confirm("Purge all mesh data?")) { await db.chats.clear(); await db.logs.clear(); location.reload(); }
        },

        help() {
            const f = document.getElementById('feed');
            const h = document.createElement('div');
            h.className = "bg-indigo-900 text-white p-6 rounded-2xl mb-6 shadow-xl font-mono text-xs";
            h.innerHTML = `
                <div class="text-indigo-300 font-black mb-4 uppercase text-sm border-b border-indigo-700 pb-2">Indigo_Command_Center</div>
                <div class="grid gap-3">
                    <div><span class="text-indigo-400">/help</span> - Shows this menu.</div>
                    <div><span class="text-indigo-400">/name [X]</span> - Updates node signature.</div>
                    <div><span class="text-indigo-400">/op</span> - Grants peer operator rights.</div>
                    <div><span class="text-indigo-400">/clear</span> - Wipes local current buffer.</div>
                </div>
                <div class="mt-6 pt-4 border-t border-indigo-700 text-indigo-400 text-[10px]">
                    PROTOCOL: INDIGO-P2P-MESH<br>DB: INDEXEDDB_VAULT
                </div>`;
            f.appendChild(h); f.scrollTop = f.scrollHeight; document.getElementById('mi').value = '';
        },
        copyID() { navigator.clipboard.writeText(this.me.id); alert("ID COPIED."); }
    };
</script>
</body>
</html>
