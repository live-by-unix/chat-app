<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESHANGGER</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/733/733585.png">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Inter:wght@300;500;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #6366f1; --bg-dark: #0f172a; --panel: #1e293b; --indigo-gradient: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; display: flex; color: #f8fafc; margin: 0; }
        .indigo-prime { background: var(--indigo-gradient); }
        .sidebar { width: 320px; background: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; z-index: 50; }
        @media (max-width: 1024px) { .sidebar { position: fixed; height: 100%; transform: translateX(-100%); width: 280px; } .sidebar.active { transform: translateX(0); } .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(4px); } .sidebar-overlay.active { display: block; } }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0f172a; position: relative; width: 100%; }
        .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; scroll-behavior: smooth; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .msg-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; position: relative; animation: fadeIn 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .online { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .offline { background: #64748b; }
        .help-card { background: rgba(15, 23, 42, 0.9); border: 1px solid #4338ca; border-left: 4px solid #6366f1; font-family: 'JetBrains Mono', monospace; }
        #v-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; padding: 10px; background: #000; border-bottom: 1px solid #334155; }
        #v-grid video { border-radius: 8px; width: 100%; object-fit: cover; border: 1px solid #4338ca; }
        .peer-item { transition: all 0.2s; border-radius: 12px; margin: 4px 8px; border: 1px solid transparent; }
        .peer-item:hover { background: rgba(99, 102, 241, 0.1); border-color: rgba(99, 102, 241, 0.2); }
        .active-chat { background: rgba(99, 102, 241, 0.2) !important; border-color: #6366f1 !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay" onclick="core.toggleSidebar()"></div>

<div id="auth-gate" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
    <div class="glass p-8 rounded-[2rem] w-full max-w-md shadow-2xl border border-slate-800">
        <div class="text-center mb-8">
            <div class="w-16 h-16 indigo-prime rounded-2xl mx-auto mb-4 flex items-center justify-center rotate-3 shadow-[0_0_30px_rgba(99,102,241,0.3)]">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-white uppercase">Indigo <span class="text-indigo-400">Mesh</span></h1>
            <p class="text-slate-400 text-[10px] mt-1 font-mono uppercase tracking-[0.3em]">Encrypted Peer-to-Peer Hub</p>
        </div>
        <div class="space-y-3">
            <input type="text" id="un" placeholder="NODE_ALIAS" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500 text-white font-mono text-sm transition-all">
            <input type="password" id="pw" placeholder="CLUSTER_KEY" class="w-full p-4 bg-slate-900 border border-slate-800 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500 text-white font-mono text-sm transition-all">
            <button onclick="core.boot()" class="w-full indigo-prime text-white py-4 rounded-xl font-black hover:opacity-90 transition shadow-lg uppercase text-xs tracking-widest mt-2">Initialize Node</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden flex w-full h-full">
    <aside id="sidebar" class="sidebar shadow-2xl">
        <div class="p-6 border-b border-slate-800 bg-slate-900/30">
            <div class="flex justify-between items-center mb-6">
                <span class="font-black text-xl tracking-tighter text-indigo-400">INDIGO</span>
                <button onclick="core.plusMenu()" class="p-2 bg-indigo-500/10 text-indigo-400 rounded-lg hover:bg-indigo-500 hover:text-white transition shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                </button>
            </div>
            <div class="flex gap-2">
                <button onclick="core.joinCall()" class="flex-1 bg-slate-800/50 border border-slate-700 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-600 hover:border-indigo-400 transition">Call</button>
                <button onclick="core.copyID()" class="flex-1 bg-slate-800/50 border border-slate-700 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-indigo-600 hover:border-indigo-400 transition">ID</button>
            </div>
        </div>
        
        <div id="peer-list" class="flex-1 overflow-y-auto py-4"></div>

        <div class="p-4 bg-slate-900/80 border-t border-slate-800">
            <div id="node-id" class="text-[9px] text-slate-500 font-mono break-all mb-3 opacity-60 text-center">...</div>
            <button onclick="core.deleteAll()" class="w-full py-2 text-[10px] font-bold text-red-500/60 hover:text-red-400 uppercase tracking-[0.2em] transition border border-red-500/20 rounded-lg hover:bg-red-500/5">Wipe All Data</button>
        </div>
    </aside>

    <main class="chat-area">
        <header class="glass h-16 px-4 lg:px-8 flex justify-between items-center z-10 shrink-0">
            <div class="flex items-center gap-3">
                <button onclick="core.toggleSidebar()" class="lg:hidden p-2 text-slate-400 hover:text-indigo-400 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div id="header-avatar" class="w-10 h-10 rounded-xl indigo-prime hidden lg:flex items-center justify-center text-white font-black shadow-lg">?</div>
                <div>
                    <div class="flex items-center gap-2">
                        <span id="chat-title" class="font-bold text-sm lg:text-base tracking-tight">Select Node</span>
                        <span id="header-status" class="status-dot offline"></span>
                    </div>
                    <span id="chat-status" class="text-[10px] text-slate-500 font-mono uppercase tracking-tighter">P2P_ENCRYPTED_TUNNEL</span>
                </div>
            </div>
            <div id="header-tools" class="hidden flex items-center gap-1 lg:gap-4">
                <button onclick="core.media(1)" class="p-2 hover:bg-indigo-500/10 rounded-lg text-slate-400 hover:text-indigo-400 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                <button onclick="core.media(0)" class="p-2 hover:bg-indigo-500/10 rounded-lg text-slate-400 hover:text-indigo-400 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
            </div>
        </header>

        <div id="v-grid" class="hidden">
            <video id="loc-v" autoplay muted playsinline class="scale-x-[-1] shadow-2xl"></video>
        </div>

        <div id="feed" class="chat-container bg-slate-950/20">
            <div class="h-full flex flex-col items-center justify-center text-slate-700 space-y-4">
                <div class="p-8 border-2 border-dashed border-slate-800 rounded-[3rem] opacity-20">
                    <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 20 20"><path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"></path></svg>
                </div>
                <p class="text-[10px] font-mono uppercase tracking-[0.4em]">Standby for Peer Connection</p>
            </div>
        </div>

        <div class="p-4 bg-slate-900/50 border-t border-slate-800 backdrop-blur-md">
            <div id="typing" class="text-[9px] text-indigo-400 h-4 mb-2 font-mono uppercase px-2 italic"></div>
            <div class="flex items-center gap-2 bg-slate-950/80 p-2 rounded-2xl border border-slate-800 focus-within:border-indigo-500 transition-colors">
                <button onclick="document.getElementById('file-input').click()" class="p-2 text-slate-500 hover:text-indigo-400 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>
                <input type="file" id="file-input" class="hidden" onchange="core.sendFile(this.files[0])">
                <input type="text" id="mi" placeholder="ENTER_COMMAND_OR_MSG" class="flex-1 bg-transparent p-2 outline-none text-sm text-white placeholder:text-slate-700 font-mono" oninput="core.ty()" onkeypress="if(event.key==='Enter') core.send()">
                <button onclick="core.send()" class="w-10 h-10 indigo-prime text-white rounded-xl flex items-center justify-center shadow-lg active:scale-95 transition">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
            <div class="flex gap-4 mt-3 px-3">
                <button onclick="core.addEmoji('👍')" class="text-xs grayscale hover:grayscale-0 transition opacity-50 hover:opacity-100">👍</button>
                <button onclick="core.addEmoji('😎')" class="text-xs grayscale hover:grayscale-0 transition opacity-50 hover:opacity-100">😎</button>
                <button onclick="core.addEmoji('🔥')" class="text-xs grayscale hover:grayscale-0 transition opacity-50 hover:opacity-100">🔥</button>
                <button onclick="core.addEmoji('🚀')" class="text-xs grayscale hover:grayscale-0 transition opacity-50 hover:opacity-100">🚀</button>
            </div>
        </div>
    </main>
</div>

<script>
    const db = new Dexie("IndigoEliteDB");
    db.version(1).stores({ logs: '++id, pid, n, b, y, t, fname, isFile', chats: 'pid, n, last, op, online' });

    const core = {
        p: null, peers: {}, currentPid: null, pass: '', me: { n: '', id: '', str: null },
        
        async boot() {
            this.me.n = document.getElementById('un').value.toUpperCase() || "NODE_" + Math.random().toString(36).substr(2, 4).toUpperCase();
            this.pass = document.getElementById('pw').value;
            if(!this.pass) return alert("ACCESS_DENIED: CLUSTER_KEY_REQUIRED");
            
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            this.p = new Peer();
            this.p.on('open', id => { 
                this.me.id = id; 
                document.getElementById('node-id').innerText = `ADDR: ${id}`;
                this.refreshPeers();
            });
            this.p.on('connection', c => this.initConn(c));
            this.p.on('call', call => {
                call.answer(this.me.str);
                call.on('stream', s => this.addV(call.peer, s));
            });

            window.onfocus = () => this.broadcastStatus(true);
            window.onblur = () => this.broadcastStatus(false);
        },

        initConn(c) {
            c.on('open', async () => {
                this.peers[c.peer] = c;
                const existing = await db.chats.get(c.peer);
                if (!existing) await db.chats.put({ pid: c.peer, n: 'EXTERNAL_NODE', last: Date.now(), op: false, online: true });
                await this.refreshPeers();
                this.selectChat(c.peer);
                c.send({y:'name', b: this.me.n, pass: this.pass});
            });
            c.on('data', d => {
                if(d.pass && d.pass !== this.pass) return; 
                this.handle(d, c.peer);
            });
            c.on('close', () => { 
                db.chats.update(c.peer, {online: false});
                delete this.peers[c.peer]; 
                this.refreshPeers(); 
            });
        },

        toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        },

        async refreshPeers() {
            const list = document.getElementById('peer-list');
            const chats = await db.chats.orderBy('last').reverse().toArray();
            list.innerHTML = chats.map(c => `
                <div class="peer-item p-4 flex items-center gap-3 cursor-pointer ${this.currentPid === c.pid ? 'active-chat' : ''}" onclick="core.selectChat('${c.pid}')">
                    <div class="relative shrink-0">
                        <div class="w-11 h-11 rounded-xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-xs font-black text-indigo-400 uppercase">${c.n.charAt(0)}</div>
                        <div class="absolute -bottom-1 -right-1 border-4 border-slate-900 status-dot ${c.online ? 'online' : 'offline'}"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-0.5">
                            <span class="font-bold text-xs truncate uppercase tracking-tight text-white">${c.n}</span>
                            ${c.op ? '<span class="text-[7px] bg-indigo-500 text-white px-1 rounded font-black">OP</span>' : ''}
                        </div>
                        <div class="text-[9px] text-slate-500 font-mono truncate uppercase tracking-tighter">${this.peers[c.pid] ? 'Active Tunnel' : 'Last: ' + new Date(c.last).toLocaleTimeString()}</div>
                    </div>
                </div>
            `).join('');
        },

        async selectChat(pid) {
            this.currentPid = pid;
            const chat = await db.chats.get(pid);
            if(!chat) return;
            document.getElementById('chat-title').innerText = chat.n;
            document.getElementById('header-status').className = `status-dot ${chat.online ? 'online' : 'offline'}`;
            document.getElementById('header-avatar').innerText = chat.n.charAt(0);
            document.getElementById('header-avatar').classList.remove('hidden');
            document.getElementById('header-tools').classList.remove('hidden');
            if(window.innerWidth < 1024) this.toggleSidebar();
            this.refreshPeers();
            this.loadMessages();
        },

        handle(d, pid) {
            if(d.y === 'ty') {
                if(this.currentPid === pid) document.getElementById('typing').innerText = d.is ? ">> REMOTE_NODE_WRITING..." : "";
            } else if(d.y === 'status') {
                db.chats.update(pid, {online: d.online}).then(() => this.refreshPeers());
            } else if(d.y === 'name') {
                db.chats.update(pid, { n: d.b }).then(() => this.refreshPeers());
                if(this.currentPid === pid) document.getElementById('chat-title').innerText = d.b;
            } else {
                this.draw(d, true, pid);
            }
        },

        broadcastStatus(isOnline) {
            Object.values(this.peers).forEach(p => p.send({y:'status', online: isOnline, pass: this.pass}));
        },

        async sendFile(file) {
            if(!file || !this.currentPid) return;
            const reader = new FileReader();
            reader.onload = () => {
                const m = { pid: this.currentPid, y:'msg', isFile: true, n:this.me.n, b: reader.result, fname: file.name, pass: this.pass, t:new Date().toLocaleTimeString() };
                if(this.peers[this.currentPid]) this.peers[this.currentPid].send(m);
                this.draw(m, true);
            };
            reader.readAsDataURL(file);
        },

        async send() {
            const i = document.getElementById('mi');
            const val = i.value.trim();
            if(!val) return;
            if(val.startsWith('/')) {
                const args = val.split(' ');
                const cmd = args[0].toLowerCase();
                if(cmd === '/help') return this.help();
                if(cmd === '/name') {
                    this.me.n = args.slice(1).join('_').toUpperCase();
                    Object.values(this.peers).forEach(p => p.send({y:'name', b: this.me.n, pass: this.pass}));
                    i.value = ''; return;
                }
                if(cmd === '/clear') {
                    await db.logs.where('pid').equals(this.currentPid).delete();
                    this.loadMessages();
                    i.value = ''; return;
                }
            }
            if(!this.currentPid) return alert("SELECT_NODE_FIRST");
            const m = { pid: this.currentPid, y:'msg', n:this.me.n, b:val, pass: this.pass, t:new Date().toLocaleTimeString() };
            if(this.peers[this.currentPid]) this.peers[this.currentPid].send(m);
            this.draw(m, true);
            i.value = '';
            this.ty(false);
        },

        ty(is = true) { 
            if(this.currentPid && this.peers[this.currentPid]) 
                this.peers[this.currentPid].send({y:'ty', is: is, pass: this.pass}); 
        },
        
        addEmoji(e) { document.getElementById('mi').value += e; document.getElementById('mi').focus(); },

        async draw(d, s, pid) {
            const targetPid = pid || d.pid;
            if(s) {
                await db.logs.add({ ...d, pid: targetPid });
                await db.chats.update(targetPid, { last: Date.now() });
                this.refreshPeers();
            }
            if(this.currentPid !== targetPid) return;
            const f = document.getElementById('feed');
            const w = document.createElement('div');
            w.className = d.n === this.me.n ? "flex justify-end mb-5" : "flex justify-start mb-5";
            
            let content = d.b;
            if(d.isFile) {
                content = `<a href="${d.b}" download="${d.fname}" class="flex items-center gap-3 p-2 bg-white/5 rounded-lg border border-white/10 hover:border-indigo-400 transition-colors underline decoration-indigo-500/50">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <div class="flex flex-col"><span class="text-xs font-bold uppercase">${d.fname}</span><span class="text-[8px] opacity-50">Click to Download Binary</span></div></a>`;
            }

            const m = document.createElement('div');
            m.className = `msg-bubble ${d.n === this.me.n ? 'indigo-prime text-white shadow-[0_5px_15px_rgba(67,56,202,0.4)]' : 'bg-slate-800 text-slate-200 border border-slate-700'}`;
            m.innerHTML = `<div class="text-[8px] opacity-50 mb-1 font-black tracking-widest uppercase">${d.n} // ${d.t}</div><div class="text-sm font-medium leading-relaxed">${content}</div>`;
            w.appendChild(m); f.appendChild(w); f.scrollTop = f.scrollHeight;
        },

        help() {
            const f = document.getElementById('feed');
            const h = document.createElement('div');
            h.className = "help-card p-6 rounded-2xl mb-6 shadow-2xl animate-fadeIn";
            h.innerHTML = `
                <div class="text-indigo-400 font-black mb-4 text-xs tracking-[0.3em] border-b border-indigo-900/50 pb-2 uppercase">System_Manual_v2</div>
                <div class="space-y-4 text-[10px] leading-loose">
                    <div class="grid grid-cols-3 border-b border-white/5 pb-2">
                        <span class="text-indigo-300 font-black">/NAME [X]</span>
                        <span class="col-span-2 text-slate-400 italic">Re-identify node alias on the mesh.</span>
                    </div>
                    <div class="grid grid-cols-3 border-b border-white/5 pb-2">
                        <span class="text-indigo-300 font-black">/CLEAR</span>
                        <span class="col-span-2 text-slate-400 italic">Wipe session log from local IndexedDB storage.</span>
                    </div>
                    <div class="grid grid-cols-3">
                        <span class="text-indigo-300 font-black">/HELP</span>
                        <span class="col-span-2 text-slate-400 italic">Print this lucrative command manifest.</span>
                    </div>
                    <div class="mt-4 p-3 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
                        <p class="text-indigo-200 font-black mb-1 uppercase tracking-tighter underline">Direct_Transfer:</p>
                        <p class="text-slate-400 text-[9px]">Use the attachment icon for raw binary P2P file relaying. No middleman, no size limit (subject to RAM).</p>
                    </div>
                </div>`;
            f.appendChild(h); f.scrollTop = f.scrollHeight; document.getElementById('mi').value = '';
        },

        async loadMessages() {
            const f = document.getElementById('feed');
            f.innerHTML = '';
            const msgs = await db.logs.where('pid').equals(this.currentPid).toArray();
            msgs.forEach(m => this.draw(m, false));
            f.scrollTop = f.scrollHeight;
        },

        plusMenu() {
            const id = prompt("SYNC_NEW_PEER (Paste Node ID):");
            if(id && id !== this.me.id) this.initConn(this.p.connect(id));
        },

        joinCall() {
            const id = prompt("STREAM_REQUEST_ID:");
            if(id && this.me.str) this.p.call(id, this.me.str);
            else if(id) alert("ERROR: Enable local stream (Video/Audio icon) before joining.");
        },

        async media(isV) {
            try {
                if(!this.me.str) {
                    this.me.str = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('loc-v').srcObject = this.me.str;
                    document.getElementById('v-grid').classList.remove('hidden');
                }
                const t = isV ? this.me.str.getVideoTracks()[0] : this.me.str.getAudioTracks()[0];
                t.enabled = !t.enabled;
            } catch(e) { alert("HARDWARE_ERROR: Permission Denied."); }
        },

        async deleteAll() {
            if(confirm("DANGER: This will permanently destroy all chats and node history. Proceed?")) { 
                await db.chats.clear(); await db.logs.clear(); location.reload(); 
            }
        },
        copyID() { navigator.clipboard.writeText(this.me.id); alert("NODE_ADDR_COPIED"); }
    };
</script>
