<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCA</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <style>
        :root { --p: #00ff88; --bg: #000; --s: #0a0a0a; --t: #fff; --b: #222; --f: 'Inter', sans-serif; }
        * { box-sizing: border-box; font-family: var(--f); font-size: 13px; color: var(--t); transition: 0.2s ease; }
        body { margin: 0; background: var(--bg); display: flex; height: 100vh; overflow: hidden; }
        #auth { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; border: 4px solid var(--p); }
        #side { width: 320px; background: var(--s); border-right: 1px solid var(--b); display: flex; flex-direction: column; z-index: 20; }
        #stage { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle, #050505 0%, #000 100%); }
        #v-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; padding: 15px; min-height: 0; flex: 0; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; border: 1px solid var(--b); border-radius: 12px; }
        #feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
        .m { padding: 12px; border: 1px solid var(--b); background: #080808; max-width: 80%; border-radius: 12px; position: relative; }
        .m.me { align-self: flex-end; border-color: var(--p); background: #001a08; }
        .m.sys { align-self: center; border: 0; opacity: 0.4; font-size: 10px; }
        #dock { padding: 20px; background: #000; border-top: 1px solid var(--b); display: flex; gap: 10px; }
        input, button { background: #000; color: var(--p); border: 1px solid var(--p); padding: 12px; border-radius: 8px; outline: none; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: var(--p); color: #000; transform: translateY(-1px); }
        .active { background: #ff4444 !important; color: #fff !important; border: 0 !important; }
        .hud { font-size: 10px; opacity: 0.5; padding: 5px 20px; display: flex; justify-content: space-between; border-top: 1px solid #111; }
        .hidden { display: none !important; }
    </style>
</head>
<body ondragover="event.preventDefault()" ondrop="core.drop(event)">

<div id="auth">
    <div style="padding: 40px; border: 1px solid var(--p); background: #050505; text-align: center; width: 380px;">
        <h1 style="color:var(--p); margin:0; letter-spacing: 2px;">TCA_GALAXY</h1>
        <p style="opacity:0.4; margin-bottom:30px; font-size:10px;">MULTIMEDIA_MESH_V2000</p>
        <input type="text" id="un" placeholder="NODE_ALIAS" style="width:100%; margin-bottom:20px;">
        <button style="width:100%" onclick="core.boot()">BOOT_CORE</button>
    </div>
</div>

<div id="side">
    <div style="padding:30px; text-align:center; border-bottom:1px solid var(--b);">
        <div id="u-disp" style="color:var(--p); font-weight:900; font-size:18px;"></div>
        <div id="u-id" style="font-size:9px; opacity:0.3; margin-top:5px; cursor:pointer;" onclick="core.copy()">ID: OFFLINE</div>
    </div>
    <div style="padding:20px; flex:1; overflow-y:auto;">
        <button style="width:100%; margin-bottom:10px;" onclick="core.host()">INITIALIZE_HOST</button>
        <button style="width:100%; background:#111; border-color:#333" onclick="core.join()">SYNC_PEER</button>
        <div style="margin:25px 0; height:1px; background:#222;"></div>
        <button id="cam-b" style="width:100%; margin-bottom:10px;" onclick="core.media(1)">📷 VIDEO_OFF</button>
        <button id="mic-b" style="width:100%; margin-bottom:10px;" onclick="core.media(0)">🎤 AUDIO_OFF</button>
        <div id="plist" style="margin-top:20px;"></div>
    </div>
</div>

<div id="stage">
    <div id="v-grid" class="hidden">
        <video id="loc-v" autoplay muted playsinline></video>
    </div>
    <div id="feed"></div>
    <div class="hud">
        <span id="typing"></span>
        <span id="stat">MESH_STABLE | 0 KB</span>
    </div>
    <div id="dock">
        <input type="text" id="mi" placeholder="ENTER_COMMAND_OR_MSG..." style="flex:1" onkeypress="if(event.key==='Enter') core.send()">
        <button onclick="core.send()">SEND</button>
    </div>
</div>

<script>
    const db = new Dexie("GalaxyDB");
    db.version(1).stores({ logs: '++id, t, n, b, y' });

    const core = {
        p: null, peers: {}, me: { n: '', id: '', str: null, bytes: 0 },
        async boot() {
            this.me.n = document.getElementById('un').value || "ANON_"+Math.random().toString(16).slice(2,5);
            document.getElementById('u-disp').innerText = this.me.n;
            document.getElementById('auth').classList.add('hidden');
            this.p = new Peer();
            this.p.on('open', id => { this.me.id = id; document.getElementById('u-id').innerText = id; this.load(); });
            this.p.on('connection', c => {
                c.on('open', () => { this.peers[c.peer] = c; this.sync(); });
                c.on('data', d => this.handle(d));
            });
            this.p.on('call', call => {
                call.answer(this.me.str);
                call.on('stream', s => this.addV(call.peer, s));
            });
        },
        async load() { (await db.logs.orderBy('id').reverse().limit(50).toArray()).reverse().forEach(m => this.draw(m, false)); },
        async media(isVid) {
            if(!this.me.str) {
                this.me.str = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('loc-v').srcObject = this.me.str;
                document.getElementById('v-grid').classList.remove('hidden');
            }
            const t = isVid ? this.me.str.getVideoTracks()[0] : this.me.str.getAudioTracks()[0];
            t.enabled = !t.enabled;
            const b = document.getElementById(isVid ? 'cam-b' : 'mic-b');
            b.classList.toggle('active', t.enabled);
            b.innerText = t.enabled ? `${isVid?'VIDEO':'AUDIO'}_ON` : `${isVid?'VIDEO':'AUDIO'}_OFF`;
            if(t.enabled) Object.keys(this.peers).forEach(id => this.p.call(id, this.me.str));
        },
        addV(id, s) {
            if(document.getElementById('v-'+id)) return;
            const v = document.createElement('video'); v.id = 'v-'+id; v.srcObject = s; v.autoplay = true; v.playsinline = true;
            document.getElementById('v-grid').appendChild(v);
            document.getElementById('v-grid').classList.remove('hidden');
        },
        handle(d) {
            this.me.bytes += JSON.stringify(d).length;
            document.getElementById('stat').innerText = `MESH_STABLE | ${(this.me.bytes/1024).toFixed(1)} KB`;
            if(['msg','sys','file'].includes(d.y)) this.draw(d, true);
            if(d.y === 'hi') this.sync();
        },
        send() {
            const i = document.getElementById('mi'); if(!i.value) return;
            if(i.value.startsWith('/')) return this.exec(i.value);
            const m = { y:'msg', n:this.me.n, b:i.value, t:new Date().toLocaleTimeString() };
            Object.values(this.peers).forEach(p => p.send(m)); this.draw(m, true); i.value = '';
        },
        exec(v) {
            const [c, a] = v.split(' ');
            if(c === '/void') { db.logs.clear(); location.reload(); }
            if(c === '/theme') document.documentElement.style.setProperty('--p', a);
            document.getElementById('mi').value = '';
        },
        host() { this.draw({y:'sys', b:'NODE_ELEVATED_TO_HOST'}); },
        join() {
            const id = prompt("PEER_NODE_ID:");
            if(id) {
                const c = this.p.connect(id);
                c.on('open', () => { this.peers[id] = c; c.send({y:'hi'}); });
                c.on('data', d => this.handle(d));
            }
        },
        sync() {
            const l = document.getElementById('plist'); l.innerHTML = '';
            Object.keys(this.peers).forEach(id => {
                const r = document.createElement('div'); r.style.cssText = "padding:10px; border:1px solid #111; margin-bottom:5px; border-radius:8px; display:flex; justify-content:space-between;";
                r.innerHTML = `<span style="font-size:10px;">PEER_${id.slice(0,5)}</span><button onclick="core.call('${id}')" style="padding:2px 8px; font-size:9px;">CALL</button>`;
                l.appendChild(r);
            });
        },
        call(id) { if(this.me.str) this.p.call(id, this.me.str); else alert("ENABLE_HARDWARE_FIRST"); },
        draw(d, s) {
            if(s) db.logs.add(d);
            const f = document.getElementById('feed');
            const r = document.createElement('div');
            r.className = `m ${d.n === this.me.n ? 'me' : ''} ${d.y}`;
            r.innerHTML = `<div style="font-size:8px; opacity:0.3; margin-bottom:4px;">${d.n || 'EXE'}</div>${d.b}`;
            f.appendChild(r); f.scrollTop = f.scrollHeight;
        },
        drop(e) {
            e.preventDefault(); const f = e.dataTransfer.files[0]; const r = new FileReader();
            r.onload = () => {
                const m = { y:'file', b: `UPLOAD: <a href="${r.result}" download="${f.name}" style="color:var(--p)">${f.name}</a>`, n:this.me.n };
                Object.values(this.peers).forEach(p => p.send(m)); this.draw(m, true);
            };
            r.readAsDataURL(f);
        },
        copy() { navigator.clipboard.writeText(this.me.id); alert("ID_CACHED"); }
    };
</script>
</body>
</html>
