<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MESHANGER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bright-indigo: #6366f1; 
            --deep-indigo: #4338ca;
            --dark-bg: #0a0c14;
            --panel-bg: #141726;
        }
        body { background-color: var(--dark-bg); font-family: 'Inter', sans-serif; height: 100dvh; overflow: hidden; display: flex; color: #e2e8f0; }
        
        .indigo-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); }
        .indigo-gradient { background: linear-gradient(135deg, var(--bright-indigo) 0%, var(--deep-indigo) 100%); }
        
        .sidebar { 
            width: 320px; background: var(--panel-bg); border-right: 1px solid #1e293b; 
            display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 50;
        }
        
        @media (max-width: 1024px) {
            .sidebar { position: fixed; height: 100%; transform: translateX(-100%); width: 280px; }
            .sidebar.active { transform: translateX(0); }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40; backdrop-filter: blur(4px); }
            .sidebar-overlay.active { display: block; }
        }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--dark-bg); position: relative; }
        .chat-container { flex: 1; overflow-y: auto; padding: 1.5rem; scroll-behavior: smooth; background-image: radial-gradient(circle at 50% 50%, #1a1c2e 0%, #0a0c14 100%); }
        
        .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 14px; animation: slideIn 0.2s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .peer-item { border-radius: 12px; margin: 4px 12px; transition: 0.2s; border: 1px solid transparent; cursor: pointer; }
        .peer-item:hover { background: rgba(99, 102, 241, 0.1); }
        .active-chat { background: rgba(99, 102, 241, 0.2) !important; border-color: var(--bright-indigo) !important; box-shadow: 0 0 15px rgba(99,102,241,0.1); }

        .status-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--panel-bg); }
        .online { background: #10b981; box-shadow: 0 0 8px #10b981; }
        
        #v-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; padding: 10px; background: #000; border-bottom: 2px solid var(--bright-indigo); }
        video { width: 100%; border-radius: 8px; border: 1px solid var(--bright-indigo); background: #111; }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--bright-indigo); border-radius: 10px; }
    </style>
</head>
<body>

<div id="sidebar-overlay" class="sidebar-overlay" onclick="core.toggleSidebar()"></div>

<div id="auth-gate" class="fixed inset-0 z-[100] bg-slate-950 flex items-center justify-center p-4">
    <div class="bg-[#141726] p-10 rounded-[2.5rem] w-full max-w-md border border-indigo-500/20 shadow-[0_0_50px_rgba(99,102,241,0.15)]">
        <div class="text-center mb-8">
            <div class="w-20 h-20 indigo-gradient rounded-3xl mx-auto mb-6 flex items-center justify-center indigo-glow">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"></path></svg>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Indigo<span class="text-indigo-500">Mesh</span></h1>
            <p class="text-indigo-400/50 text-[10px] font-mono mt-2 tracking-[0.4em]">PEER-TO-PEER ENCRYPTION</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="un" placeholder="NODE_ALIAS" class="w-full p-4 bg-slate-900/50 border border-indigo-500/20 rounded-2xl outline-none focus:border-indigo-500 text-white font-mono transition-all">
            <input type="password" id="pw" placeholder="ENCRYPTION_KEY" class="w-full p-4 bg-slate-900/50 border border-indigo-500/20 rounded-2xl outline-none focus:border-indigo-500 text-white font-mono transition-all">
            <button onclick="core.boot()" class="w-full indigo-gradient text-white py-4 rounded-2xl font-black hover:scale-[1.02] transition-all shadow-lg uppercase tracking-widest text-sm">Initialize Node</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden flex w-full h-full">
    <aside id="sidebar" class="sidebar">
        <div class="p-8 border-b border-indigo-500/10">
            <div class="flex justify-between items-center mb-8">
                <span class="font-black text-2xl tracking-tighter text-white">INDIGO</span>
                <button onclick="core.plusMenu()" class="w-10 h-10 indigo-gradient text-white rounded-xl flex items-center justify-center hover:rotate-90 transition-all duration-300 shadow-lg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                </button>
            </div>
            <button onclick="core.joinCall()" class="w-full bg-indigo-500/10 border border-indigo-500/30 text-indigo-400 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-indigo-500 hover:text-white transition-all">Connect Stream</button>
        </div>
        
        <div id="peer-list" class="flex-1 overflow-y-auto py-4"></div>

        <div class="p-6 bg-slate-950/40 border-t border-indigo-500/10">
            <div id="node-id" class="text-[9px] text-indigo-500/50 font-mono break-all mb-4 text-center cursor-pointer hover:text-indigo-400" onclick="core.copyID()">ADDR: ...</div>
            <button onclick="core.deleteAll()" class="w-full py-2 text-[10px] font-bold text-red-500/40 hover:text-red-500 uppercase tracking-widest transition">Purge Protocol</button>
        </div>
    </aside>

    <main class="chat-area">
        <header class="h-20 px-6 lg:px-10 flex justify-between items-center bg-[#141726]/80 backdrop-blur-md border-b border-indigo-500/10 z-10 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="core.toggleSidebar()" class="lg:hidden p-2 text-indigo-400">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div id="header-avatar" class="w-12 h-12 rounded-2xl indigo-gradient hidden lg:flex items-center justify-center text-white font-black text-xl shadow-lg">?</div>
                <div>
                    <div class="flex items-center gap-2">
                        <span id="chat-title" class="font-black text-lg tracking-tight text-white">Select Node</span>
                        <div id="header-status" class="status-dot opacity-0 transition-opacity"></div>
                    </div>
                    <span id="chat-status" class="text-[10px] text-indigo-400/60 font-mono uppercase tracking-widest">Securing Connection...</span>
                </div>
            </div>
            <div id="header-tools" class="hidden flex items-center gap-2">
                <button onclick="core.media(1)" class="p-3 text-slate-400 hover:text-indigo-400 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                <button onclick="core.media(0)" class="p-3 text-slate-400 hover:text-indigo-400 transition"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
            </div>
        </header>

        <div id="v-grid" class="hidden">
            <video id="loc-v" autoplay muted playsinline class="scale-x-[-1]"></video>
        </div>

        <div id="feed" class="chat-container"></div>

        <div class="p-6 bg-[#141726]/80 backdrop-blur-md border-t border-indigo-500/10">
            <div id="typing" class="text-[9px] text-indigo-400 h-5 mb-2 font-mono uppercase ml-2 italic"></div>
            <div class="flex items-center gap-3 bg-slate-900/80 p-2 rounded-[1.5rem] border border-indigo-500/20 focus-within:border-indigo-500 transition-all">
                <button onclick="document.getElementById('f-in').click()" class="p-3 text-indigo-400/50 hover:text-indigo-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                </button>
                <input type="file" id="f-in" class="hidden" onchange="core.sendFile(this.files[0])">
                <input type="text" id="mi" placeholder="ENTER_COMMAND_OR_MSG" class="flex-1 bg-transparent p-2 outline-none text-sm text-white placeholder:text-slate-700 font-mono" oninput="core.ty()" onkeypress="if(event.key==='Enter') core.send()">
                <button onclick="core.send()" class="w-12 h-12 indigo-gradient text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-95 transition-all">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                </button>
            </div>
        </div>
    </main>
</div>

<script>
    const db = new Dexie("IndigoV3DB");
    db.version(1).stores({ logs: '++id, pid, n, b, y, t, isFile, fname', chats: 'pid, n, last, op, online' });

    const core = {
        p: null, peers: {}, currentPid: null, pass: '', me: { n: '', id: '', str: null },
        
        async boot() {
            this.me.n = document.getElementById('un').value.toUpperCase() || "NODE_" + Math.random().toString(36).substr(2,4).toUpperCase();
            this.pass = document.getElementById('pw').value;
            if(!this.pass) return alert("CRITICAL_ERROR: ENCRYPTION_KEY_REQUIRED");
            
            document.getElementById('auth-gate').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            this.p = new Peer();
            this.p.on('open', id => { 
                this.me.id = id; 
                document.getElementById('node-id').innerText = `NODE_ADDR: ${id}`;
                this.refreshPeers();
            });
            this.p.on('connection', c => this.initConn(c));
            this.p.on('call', call => {
                call.answer(this.me.str);
                call.on('stream', s => this.addV(call.peer, s));
            });
        },

        initConn(c) {
            c.on('open', async () => {
                this.peers[c.peer] = c;
                const existing = await db.chats.get(c.peer);
                if (!existing) await db.chats.put({ pid: c.peer, n: 'EXTERNAL_NODE', last: Date.now(), op: false, online: true });
                await this.refreshPeers();
                this.selectChat(c.peer);
                c.send({y:'name', b: this.me.n, pass: this.pass});
            });
            c.on('data', d => {
                if(d.pass && d.pass !== this.pass) return; 
                this.handle(d, c.peer);
            });
            c.on('close', () => { 
                db.chats.update(c.peer, {online: false});
                delete this.peers[c.peer]; this.refreshPeers(); 
            });
        },

        plusMenu() {
            const act = prompt("TYPE 'HOST' TO COPY ID OR 'JOIN' TO SYNC PEER:").toUpperCase();
            if(act === 'HOST') this.copyID();
            if(act === 'JOIN') {
                const id = prompt("ENTER PEER NODE ADDR:");
                if(id && id !== this.me.id) this.initConn(this.p.connect(id));
            }
        },

        toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('sidebar-overlay').classList.toggle('active');
        },

        async refreshPeers() {
            const list = document.getElementById('peer-list');
            const chats = await db.chats.orderBy('last').reverse().toArray();
            list.innerHTML = chats.map(c => `
                <div class="peer-item p-4 flex items-center gap-4 ${this.currentPid === c.pid ? 'active-chat' : ''}" onclick="core.selectChat('${c.pid}')">
                    <div class="relative shrink-0">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 border border-indigo-500/20 flex items-center justify-center text-indigo-400 font-black">${c.n[0]}</div>
                        <div class="absolute -bottom-1 -right-1 status-dot ${c.online ? 'online' : 'offline'}"></div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-xs truncate uppercase text-white tracking-tighter">${c.n}</span>
                            ${c.op ? '<span class="text-[7px] bg-indigo-500 text-white px-1.5 py-0.5 rounded-md font-black">OP</span>' : ''}
                        </div>
                        <div class="text-[9px] text-indigo-400/40 font-mono truncate uppercase tracking-tighter">${this.peers[c.pid] ? 'Active Tunnel' : 'Standby'}</div>
                    </div>
                </div>
            `).join('');
        },

        async selectChat(pid) {
            this.currentPid = pid;
            const chat = await db.chats.get(pid);
            if(!chat) return;
            document.getElementById('chat-title').innerText = chat.n;
            document.getElementById('header-status').className = `status-dot ${chat.online ? 'online' : 'offline'}`;
            document.getElementById('header-status').classList.remove('opacity-0');
            document.getElementById('header-avatar').innerText = chat.n[0];
            document.getElementById('header-avatar').classList.remove('hidden');
            document.getElementById('header-tools').classList.remove('hidden');
            document.getElementById('chat-status').innerText = `PEER_ID: ${pid.substring(0,12)}...`;
            if(window.innerWidth < 1024) this.toggleSidebar();
            this.refreshPeers();
            this.loadMessages();
        },

        handle(d, pid) {
            if(d.y === 'ty') {
                if(this.currentPid === pid) document.getElementById('typing').innerText = d.is ? ">> REMOTE_NODE_WRITING..." : "";
            } else if(d.y === 'name') {
                db.chats.update(pid, { n: d.b }).then(() => this.refreshPeers());
                if(this.currentPid === pid) document.getElementById('chat-title').innerText = d.b;
            } else {
                this.draw(d, true, pid);
            }
        },

        async send() {
            const i = document.getElementById('mi');
            const val = i.value.trim();
            if(!val) return;
            if(val.startsWith('/')) {
                const args = val.split(' ');
                const cmd = args[0].toLowerCase();
                if(cmd === '/help') return this.help();
                if(cmd === '/name') {
                    this.me.n = args.slice(1).join('_').toUpperCase();
                    Object.values(this.peers).forEach(p => p.send({y:'name', b: this.me.n, pass: this.pass}));
                    i.value = ''; return;
                }
                if(cmd === '/clear') {
                    await db.logs.where('pid').equals(this.currentPid).delete();
                    this.loadMessages();
                    i.value = ''; return;
                }
            }
            if(!this.currentPid) return;
            const m = { pid: this.currentPid, y:'msg', n:this.me.n, b:val, pass: this.pass, t:new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) };
            if(this.peers[this.currentPid]) this.peers[this.currentPid].send(m);
            this.draw(m, true);
            i.value = '';
            this.ty(false);
        },

        async sendFile(file) {
            if(!file || !this.currentPid) return;
            const reader = new FileReader();
            reader.onload = () => {
                const m = { pid: this.currentPid, y:'msg', isFile: true, n:this.me.n, b: reader.result, fname: file.name, pass: this.pass, t:new Date().toLocaleTimeString() };
                if(this.peers[this.currentPid]) this.peers[this.currentPid].send(m);
                this.draw(m, true);
            };
            reader.readAsDataURL(file);
        },

        async draw(d, s, pid) {
            const targetPid = pid || d.pid;
            if(s) {
                await db.logs.add({ ...d, pid: targetPid });
                await db.chats.update(targetPid, { last: Date.now() });
                this.refreshPeers();
            }
            if(this.currentPid !== targetPid) return;
            const f = document.getElementById('feed');
            const isMe = d.n === this.me.n;
            const w = document.createElement('div');
            w.className = isMe ? "flex justify-end mb-6" : "flex justify-start mb-6";
            
            let content = d.b;
            if(d.isFile) {
                content = `<div class="flex items-center gap-3 p-3 bg-indigo-500/10 rounded-xl border border-indigo-500/20">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <div class="flex flex-col"><span class="text-[10px] font-bold text-white uppercase truncate max-w-[150px]">${d.fname}</span><a href="${d.b}" download="${d.fname}" class="text-[9px] text-indigo-400 font-black uppercase underline mt-1">Download</a></div>
                </div>`;
            }

            const m = document.createElement('div');
            m.className = `msg-bubble ${isMe ? 'indigo-gradient text-white shadow-lg' : 'bg-[#1e2235] text-slate-200 border border-slate-800'}`;
            m.innerHTML = `<div class="text-[8px] opacity-40 mb-1 font-black tracking-widest uppercase">${d.n} • ${d.t}</div><div class="font-medium leading-relaxed">${content}</div>`;
            w.appendChild(m); f.appendChild(w); f.scrollTop = f.scrollHeight;
        },

        ty(is = true) { 
            if(this.currentPid && this.peers[this.currentPid]) 
                this.peers[this.currentPid].send({y:'ty', is: is, pass: this.pass}); 
        },

        help() {
            const f = document.getElementById('feed');
            const h = document.createElement('div');
            h.className = "bg-indigo-950/40 p-6 rounded-3xl mb-6 border border-indigo-500/30 animate-pulse";
            h.innerHTML = `
                <div class="text-indigo-400 font-black mb-4 text-xs tracking-[0.3em] uppercase">Node_Manifest_V3</div>
                <div class="space-y-3 text-[10px] font-mono leading-relaxed">
                    <p><span class="text-white">/NAME [ALIAS]</span> - Update node signature.</p>
                    <p><span class="text-white">/CLEAR</span> - Purge local session buffer.</p>
                    <p><span class="text-white">/HELP</span> - Deploy this documentation.</p>
                    <div class="mt-4 p-4 bg-indigo-500/10 rounded-2xl border border-indigo-500/20 text-indigo-300 italic">
                        "Secure direct transfer active. Attach files via the paperclip icon for raw binary relay."
                    </div>
                </div>`;
            f.appendChild(h); f.scrollTop = f.scrollHeight; document.getElementById('mi').value = '';
        },

        async media(isV) {
            try {
                if(!this.me.str) {
                    this.me.str = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    document.getElementById('loc-v').srcObject = this.me.str;
                    document.getElementById('v-grid').classList.remove('hidden');
                }
                const t = isV ? this.me.str.getVideoTracks()[0] : this.me.str.getAudioTracks()[0];
                t.enabled = !t.enabled;
            } catch(e) { alert("HARDWARE_ERROR: Permission Denied."); }
        },

        joinCall() {
            const id = prompt("STREAM_TARGET_ADDR:");
            if(id && this.me.str) this.p.call(id, this.me.str);
            else if(id) alert("INIT_HARDWARE: Enable camera icon first.");
        },

        async deleteAll() {
            if(confirm("DANGER: WIPE ALL NODE DATA?")) { await db.chats.clear(); await db.logs.clear(); location.reload(); }
        },
        copyID() { navigator.clipboard.writeText(this.me.id); alert("NODE_ADDR_COPIED"); }
    };
</script>
</body>
</html>
